<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<canvas id="stars"></canvas>

<div class="slides">

<section class="slide hero">

<h1>Our Story ❤️</h1>
<p>Scroll to relive our memories</p>

<!-- <button class="btn">Start</button> -->

</section>


<section class="slide">

<div class="card">

<h2>The Beginning</h2>

<img src="images/photo1.jpg">

<p>The day our journey started.</p>

</div>

</section>


<section class="slide">

<div class="card">

<h2>Beautiful Moments</h2>

<img src="images/photo2.jpg">

<p>Every moment with you became special.</p>

</div>

</section>


<section class="slide">

<div class="card">

<h2>365 Days Later</h2>

<img src="images/photo3.jpg">

<p>And I still fall for you everyday ❤️</p>

</div>

</section>


<section class="slide final">

<h1>Happy 1 Year Anniversary ❤️</h1>

<button class="btn celebrate" onclick="confettiBurst()">Celebrate 🎉</button>

</section>

</div>


<!-- Floating Music Player -->

<div class="music-player" onclick="toggleMusic()">

<div class="player-bar">

<div class="song-info">
<h3>Entha Chitram</h3>
<p>Charan Cherry</p>
</div>

<button class="play-button" id="playy">▶️</button>

</div>

<div class="album-cover">
<img src="images/album.jpeg" alt="album">
</div>

</div>


<audio id="music" loop>

<source src="song.mp3">

</audio>

<script src="script.js"></script>

</body>
</html>
